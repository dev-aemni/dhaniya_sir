<!DOCTYPE html>
<html lang="en">
<head> <link rel="icon" href="https://dev-aemni.github.io/dhaniya_sir/pfp.gif">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhaniya Sir</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f1117;
    --card:#161b22;
    --accent:#5865F2;
    --accent-hover:#6d78ff;
    --text:#ffffff;
    --muted:#9ca3af;
    --border:rgba(255,255,255,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at top,#5865f230 0%,transparent 40%),
        linear-gradient(180deg,#0b0d13,#111827);
    color:var(--text);
    overflow-x:hidden;
}

.bg-blur{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.bg-blur::before,
.bg-blur::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
}

.bg-blur::before{
    background:#5865f255;
    top:-120px;
    left:-120px;
}

.bg-blur::after{
    background:#8b5cf655;
    bottom:-120px;
    right:-120px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    gap:12px;
    align-items:center;
    font-weight:800;
    font-size:1.1rem;
}

.logo-icon{
    width:42px;
    height:42px;
    border-radius:12px;
    object-fit:cover;
    border:2px solid rgba(255,255,255,.1);
}

.hero{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero-content{
    max-width:750px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.badge{
    display:inline-flex;
    gap:8px;
    align-items:center;
    padding:8px 14px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.04);
    border-radius:999px;
    color:#cbd5e1;
    margin-bottom:24px;
}

h1{
    font-size:clamp(2.8rem,7vw,5.2rem);
    line-height:1;
    font-weight:800;
    margin-bottom:20px;
}

.gradient{
    background:linear-gradient(90deg,#ffffff,#8ea0ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:var(--muted);
    font-size:1.15rem;
    line-height:1.7;
    max-width:650px;
    margin:auto;
}

.buttons{
    margin-top:40px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:16px 28px;
    border-radius:14px;
    font-weight:700;
    transition:.25s;
}

.btn-primary{
    background:var(--accent);
    color:white;
}

.btn-primary:hover{
    background:var(--accent-hover);
    transform:translateY(-2px);
}

.btn-secondary{
    border:1px solid var(--border);
    background:rgba(255,255,255,.04);
    color:white;
}

.btn-secondary:hover{
    background:rgba(255,255,255,.08);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:80px;
}

.card{
    background:rgba(255,255,255,.04);
    border:1px solid var(--border);
    border-radius:20px;
    padding:24px;
    backdrop-filter:blur(15px);
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
    border-color:rgba(88,101,242,.5);
}

.card h3{
    font-size:2rem;
    margin-bottom:6px;
}

.card p{
    color:var(--muted);
}

footer{
    margin-top:80px;
    padding:30px;
    text-align:center;
    color:var(--muted);
    border-top:1px solid var(--border);
}

@media(max-width:700px){
    .buttons{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }
}
.hero-avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;

    display:block;
    margin:0 auto 24px;

    border:4px solid rgba(255,255,255,.1);

    box-shadow:
        0 0 30px rgba(88,101,242,.4),
        0 0 80px rgba(88,101,242,.2);
}
</style>
</head>
<body>

<div class="bg-blur"></div>

<div class="container">

<nav>
    <div class="logo">
        <img
    class="logo-icon"
    src="https://dev-aemni.github.io/dhaniya_sir/pfp.gif"
    alt="Dhaniya Sir"
/>
        <span>Dhaniya Sir</span>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
<img
    class="hero-avatar"
    src="https://dev-aemni.github.io/dhaniya_sir/pfp.gif"
    alt="Dhaniya Sir"
/>
        <div class="badge">
            Discord Bot
        </div>

        <h1>
            Meet <span class="gradient">Dhaniya Sir</span>
        </h1>

        <p class="subtitle">
            A powerful Discord bot built to make your server smarter,
            easier to manage, and more fun for everyone.
        </p>

        <div class="buttons">
            <a
                class="btn btn-primary"
                href="https://discord.com/oauth2/authorize?client_id=1490977175724359801&permissions=8&scope=bot%20applications.commands"
                target="_blank"
            >
                Add Bot
            </a>

            <a
                class="btn btn-secondary"
                href="https://discord.gg/JHnVsJJg4x"
                target="_blank"
            >
                Support Server
            </a>
        </div>

        <div class="stats">
            <div class="card">
                <h3>24/7</h3>
                <p>Online & Ready</p>
            </div>

            <div class="card">
                <h3>⚡</h3>
                <p>Fast Commands</p>
            </div>

            <div class="card">
                <h3>🛡️</h3>
                <p>Reliable System</p>
            </div>
        </div>

    </div>
</section>

<footer>
    © 2026 Dhaniya Sir • Powered by Dhaniya
</footer>

</div>

</body>
</html>
